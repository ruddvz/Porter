# Publishes /docs to GitHub Pages (Settings → Pages → Source: GitHub Actions).
# Enable Pages in the repo settings after merging this workflow.

name: Deploy docs to GitHub Pages

on:
  push:
    branches: ["main"]
    paths: ["docs/**", ".github/workflows/pages.yml", ".github/scripts/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Optional: set repository variable PORTER_LIVE_URL (e.g. https://porter-xxx.vercel.app)
      # so the GitHub Pages landing shows an "Open live app" button next to Deploy.
      - name: Inject live app link into docs
        env:
          PORTER_LIVE_URL: ${{ vars.PORTER_LIVE_URL }}
        run: python3 .github/scripts/inject-docs-live-url.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
